<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>photobooth</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <span class="logo">photobooth 📸</span>
    <span class="subtitle">4 shots · 1 strip</span>
  </header>

  <main class="layout">

    <!-- Left: camera + controls -->
    <section class="cam-section">

      <div class="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="preview-canvas"></canvas>
        <div class="flash" id="flash"></div>
        <div class="countdown" id="countdown"></div>
      </div>

      <!-- Filter selector -->
      <div class="filter-row">
        <button class="filter-btn active" data-filter="none">color</button>
        <button class="filter-btn" data-filter="grayscale">B&amp;W</button>
        <button class="filter-btn" data-filter="sepia">sepia</button>
        <button class="filter-btn" data-filter="vivid">vivid</button>
        <button class="filter-btn" data-filter="cool">cool</button>
      </div>

      <!-- Action buttons -->
      <div class="controls">
        <button class="btn-shoot" id="shoot-btn" disabled>
          take photo 📷
        </button>
        <button class="btn-retake" id="retake-btn" style="display:none">
          ↩ retake last photo
        </button>
      </div>

      <p class="status" id="status">allow camera access to get started.</p>
      <p class="shot-count" id="shot-count"></p>

            <!-- Step 1: layout picker (hidden once shooting starts) -->
      <div id="layout-picker">
        <p class="strip-label">1. Choose style</p>
        <div class="layout-btns">
          <button class="layout-btn active" data-layout="classic">Classic 4</button>
          <button class="layout-btn" data-layout="short">Short 3</button>
          <button class="layout-btn" data-layout="polaroid">Polaroid</button>
          <button class="layout-btn" data-layout="grid">Grid 2×2</button>
        </div>
      </div>

      <!-- Step 2: strip editor (shown after all photos taken) -->
      <div id="strip-editor" style="display:none">
        <p class="strip-label">2. Strip color</p>
        <div class="color-row">
          <input type="color" id="color-picker" value="#111111" title="Pick a color" />
          <div class="color-swatches">
            <button class="color-btn active" data-color="#111111" style="background:#111111"></button>
            <button class="color-btn" data-color="#ffffff"       style="background:#ffffff"></button>
            <button class="color-btn" data-color="#f4c2c2"       style="background:#f4c2c2"></button>
            <button class="color-btn" data-color="#c2d4f4"       style="background:#c2d4f4"></button>
            <button class="color-btn" data-color="#c2f4d0"       style="background:#c2f4d0"></button>
            <button class="color-btn" data-color="#f4ecc2"       style="background:#f4ecc2"></button>
            <button class="color-btn" data-color="#e8c2f4"       style="background:#e8c2f4"></button>
            <button class="color-btn" data-color="#1a1a2e"       style="background:#1a1a2e"></button>
          </div>
        </div>

        <label class="date-toggle">
          <input type="checkbox" id="date-toggle" />
          Add date stamp
        </label>
      </div>

      <!-- Download + Print (shown after 4 shots) -->
      <div class="post-controls" id="post-controls" style="display:none">
        <button class="btn-download" id="dl-btn">⬇ download strip</button>
        <button class="btn-print" id="print-btn">🖨 print</button>
        <button class="btn-reset" id="reset-btn">↺ start over</button>
      </div>

    </section>

    <!-- Right: live strip preview -->
    <section class="strip-section">
      <!-- Strip preview (always visible) -->
      <p class="strip-label" style="margin-top:1rem">Preview</p>
      <canvas id="strip-canvas"></canvas>

    </section>

  </main>

  <script src="js/filters.js"></script>
  <script src="js/strip.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
